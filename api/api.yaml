openapi: 3.0.3
info:
  title: Job Scheduler API
  version: 1.0.0
  description: API for creating and managing background jobs

paths:
  /jobs:
    post:
      tags:
        - jobs
      summary: Create a new background job
      description: Creates a new job that will be queued, scheduled, and processed by workers.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
            example:
              type: send_email
              priority: 1
              payload:
                to: user@example.com
                subject: Welcome to our service
                body: Hello there!
              scheduled_at: "2026-06-10T10:00:00Z"
              recurring: every_5_minutes
              max_retries: 3
              dependencies:
                - parent-job-uuid-123

      responses:
        "200":
          description: Job created successfully
          content:
            text/plain:
              schema:
                type: string
                example: "Job created: job-uuid-12345"

        "400":
          description: Invalid JSON payload
          content:
            text/plain:
              schema:
                type: string
                example: "invalid character in JSON"

  /jobs/list:
    get:
      tags:
        - jobs
      summary: List all jobs
      description: Returns all jobs in the system with their current status.
      responses:
        "200":
          description: List of all jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"
              example:
                - id: job-uuid-12345
                  type: send_email
                  priority: 1
                  payload:
                    to: user@example.com
                    subject: Welcome
                  scheduled_at: "2026-06-10T08:30:00Z"
                  recurring: every_5_minutes
                  status: pending
                  retry_count: 0
                  max_retries: 3
                  dependencies:
                    - job-uuid-999
                  created_at: "2026-06-10T08:22:00Z"
                  updated_at: "2026-06-10T08:22:00Z"
                  error: ""

components:
  schemas:
    Job:
      type: object
      properties:
        id:
          type: string
          example: job-uuid-12345

        type:
          type: string
          example: send_email

        priority:
          type: integer
          enum: [1, 2, 3]
          example: 1

        payload:
          type: object
          additionalProperties: true
          example:
            to: user@example.com
            subject: Welcome
            body: Hello

        scheduled_at:
          type: string
          format: date-time
          example: "2026-06-10T10:00:00Z"

        recurring:
          type: string
          example: every_5_minutes

        status:
          type: string
          example: pending

        retry_count:
          type: integer
          example: 0

        max_retries:
          type: integer
          example: 3

        dependencies:
          type: array
          items:
            type: string
          example:
            - job-uuid-111
            - job-uuid-222

        created_at:
          type: string
          format: date-time
          example: "2026-06-10T08:22:00Z"

        updated_at:
          type: string
          format: date-time
          example: "2026-06-10T08:22:00Z"

        error:
          type: string
          example: ""

    CreateJobRequest:
      type: object
      required:
        - type
        - priority
      properties:
        type:
          type: string
          example: send_email

        priority:
          type: integer
          enum: [1, 2, 3]
          example: 1

        payload:
          type: object
          additionalProperties: true
          example:
            to: user@example.com
            subject: Welcome
            body: Hello

        scheduled_at:
          type: string
          format: date-time
          example: "2026-06-10T10:00:00Z"

        recurring:
          type: string
          example: every_5_minutes

        max_retries:
          type: integer
          example: 3

        dependencies:
          type: array
          items:
            type: string
          example:
            - parent-job-uuid-123

definitions:
  job.Job:
    type: object
  job.Priority:
    enum:
    - 1
    - 2
    - 3
    type: integer
    x-enum-varnames:
    - PriorityHigh
    - PriorityMedium
    - PriorityLow
info:
  contact: {}
paths:
  /jobs:
    post:
      consumes:
      - application/json
      description: Creates a new job that will be queued, scheduled, and processed
        by workers. Supports immediate, scheduled, recurring, and DAG-dependent jobs.
      parameters:
      - description: Job creation payload
        in: body
        name: job
        required: true
        schema:
          $ref: '#/definitions/job.Job'
      produces:
      - text/plain
      responses:
        "200":
          description: 'Job created: {job-id}'
          schema:
            type: string
        "400":
          description: Invalid JSON payload
          schema:
            type: string
      summary: Create a new background job
      tags:
      - jobs
  /jobs/list:
    get:
      description: Returns all jobs in the system with their current status, useful
        for live monitoring (polling).
      produces:
      - application/json
      responses:
        "200":
          description: List of all jobs
          schema:
            items:
              $ref: '#/definitions/job.Job'
            type: array
      summary: List all jobs
      tags:
      - jobs
swagger: "2.0"
